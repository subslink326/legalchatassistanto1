version: "3.9"
services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
  elastic:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.2
    environment:
      - discovery.type=single-node
    ports:
      - "9200:9200"
